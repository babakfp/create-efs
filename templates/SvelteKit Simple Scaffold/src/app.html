<!doctype html>
<html class="scrollbar-thin select-none" lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="/favicon.png" />
        <!-- Geist font -->
        <link
            rel="preload"
            as="font"
            type="font/woff2"
            href="/fonts/Geist[wght].woff2"
            crossorigin="anonymous"
        />
        <link
            rel="preload"
            as="font"
            type="font/woff2"
            href="/fonts/Geist-Italic[wght].woff2"
            crossorigin="anonymous"
        />
        <!-- Geist Mono font -->
        <link
            rel="preload"
            as="font"
            type="font/woff2"
            href="/fonts/GeistMono[wght].woff2"
            crossorigin="anonymous"
        />
        <link
            rel="preload"
            as="font"
            type="font/woff2"
            href="/fonts/GeistMono-Italic[wght].woff2"
            crossorigin="anonymous"
        />
        <style>
            /* Geist font */
            @font-face {
                font-family: "Geist Variable";
                font-style: normal;
                font-display: block;
                font-weight: 100 900;
                /* prettier-ignore */
                src: url("/fonts/Geist[wght].woff2") format("woff2-variations");
            }
            @font-face {
                font-family: "Geist Variable";
                font-style: italic;
                font-display: block;
                font-weight: 100 900;
                /* prettier-ignore */
                src: url("/fonts/Geist-Italic[wght].woff2") format("woff2-variations");
            }
            /* Geist Mono font */
            @font-face {
                font-family: "Geist Mono Variable";
                font-style: normal;
                font-display: block;
                font-weight: 100 900;
                /* prettier-ignore */
                src: url("/fonts/GeistMono[wght].woff2") format("woff2-variations");
            }
            @font-face {
                font-family: "Geist Mono Variable";
                font-style: italic;
                font-display: block;
                font-weight: 100 900;
                /* prettier-ignore */
                src: url("/fonts/GeistMono-Italic[wght].woff2") format("woff2-variations");
            }
        </style>
        %sveltekit.head%
    </head>
    <body class="bg-background text-foreground">
        <div class="contents">%sveltekit.body%</div>
    </body>
</html>
